<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vijay Book Shop</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.book{
    background:white;
    width:250px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    padding:15px;
    text-align:center;
}

.book img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:5px;
}

.price{
    font-size:20px;
    color:green;
    font-weight:bold;
}

button{
    background:green;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:darkgreen;
}
</style>
</head>

<body>

<header>
    <h1>Vijay Book Shop</h1>
    <p>Buy Books Easily</p>
</header>

<div class="container">

    <div class="bOOK">
    <img src="ChatGPT Image Jun 18, 2026, 06_46_43 PM.PNG" width="200" alt="Book 1">
        <h3>GOOD HABITS</h3>
        <p class="price">₹499</p>
        <button onclick="buyBook('GOOD HABITS','499')">Buy Now</button>
    </div>

    <div class="book">
        <img src="book2.jpg" alt="Book 2">
        <h3>Rich Dad Poor Dad</h3>
        <p class="price">₹299</p>
        <button onclick="buyBook('Rich Dad Poor Dad','299')">Buy Now</button>
    </div>

    <div class="book">
        <img src="book3.jpg" alt="Book 3">
        <h3>The Psychology of Money</h3>
        <p class="price">₹399</p>
        <button onclick="buyBook('The Psychology of Money','399')">Buy Now</button>
    </div>

    <div class="book">
        <img src="book4.jpg" alt="Book 4">
        <h3>Think and Grow Rich</h3>
        <p class="price">₹350</p>
        <button onclick="buyBook('Think and Grow Rich','350')">Buy Now</button>
    </div>

    <div class="book">
        <img src="book5.jpg" alt="Book 5">
        <h3>Harry Potter</h3>
        <p class="price">₹450</p>
        <button onclick="buyBook('Harry Potter','450')">Buy Now</button>
    </div>

    <div class="book">
        <img src="book6.jpg" alt="Book 6">
        <h3>Wings of Fire</h3>
        <p class="price">₹250</p>
        <button onclick="buyBook('Wings of Fire','250')">Buy Now</button>
    </div>

</div>

<script>

function buyBook(bookName, price){

    alert("Please message Vijay Book Shop on WhatsApp to order this book.");

    let phone = "919373746346"; // PUT YOUR NUMBER HERE

    let message =
    encodeURIComponent(
        "Hello Vijay Book Shop, I want to buy: " +
        bookName +
        " Price: ₹" +
        price
    );

    window.location.href =
    "https://wa.me/" + phone + "?text=" + message;
}

</script>

</body>
</html>
